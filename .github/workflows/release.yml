name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build app
        run: pnpm tauri build --bundles app

      - name: Create DMG
        run: |
          create-dmg \
            --volname "romescribe" \
            --window-pos 200 120 \
            --window-size 500 300 \
            --icon-size 80 \
            --icon "romescribe.app" 130 130 \
            --app-drop-link 370 130 \
            --no-internet-enable \
            romescribe-${GITHUB_REF_NAME}-aarch64.dmg \
            src-tauri/target/release/bundle/macos/romescribe.app

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: romescribe-*.dmg
