<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>romescribe</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="settings-view">
      <div class="settings-section">
        <h2>Hotkey</h2>
        <div class="hotkey-row">
          <input type="text" id="hotkey-input" class="hotkey-input" readonly placeholder="Press keys..." />
          <button id="hotkey-save" class="btn-save">Save</button>
        </div>
        <p class="hotkey-hint">Click the field, press your desired key combination, then click Save</p>
      </div>

      <div class="settings-section">
        <h2>Model</h2>
        <div id="model-list"></div>
      </div>

      <div class="settings-section">
        <h2>Performance</h2>
        <div class="toggle-row">
          <div>
            <span class="toggle-label">GPU Acceleration (Metal)</span>
            <span class="toggle-desc">Uses Apple Silicon GPU for faster inference</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="gpu-toggle" />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div id="logs-view" class="hidden">
      <div id="logs-content"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
